<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="680" viewBox="0 0 1200 680" role="img" aria-labelledby="title desc">
  <title id="title">iSCSI 风险链路</title>
  <desc id="desc">iSCSI 的客户端、网络、存储控制器和磁盘池任一环节出问题，都可能变成本地磁盘 I/O 问题。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.h{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.t{font:600 22px "Microsoft YaHei",Arial,sans-serif;fill:#25324a}.s{font:17px "Microsoft YaHei",Arial,sans-serif;fill:#5b687a}.box{fill:#fff;stroke:#d8e0ea;stroke-width:2}.warn{fill:#fff1f0;stroke:#d94b4b;stroke-width:2}.line{stroke:#66778a;stroke-width:5;fill:none;stroke-linecap:round}.dash{stroke:#d94b4b;stroke-width:3;stroke-dasharray:8 8;fill:none}.dot{fill:#d94b4b}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#66778a"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="680"/>
  <text class="h" x="600" y="66" text-anchor="middle">iSCSI 的稳定性取决于整条链路</text>
  <g transform="translate(85 240)">
    <rect class="box" x="0" y="0" width="160" height="120" rx="16"/>
    <text class="t" x="80" y="55" text-anchor="middle">客户端</text>
    <text class="s" x="80" y="86" text-anchor="middle">Initiator</text>
  </g>
  <path class="line" d="M250 300 H370" marker-end="url(#arrow)"/>
  <g transform="translate(380 240)">
    <rect class="box" x="0" y="0" width="160" height="120" rx="16"/>
    <text class="t" x="80" y="55" text-anchor="middle">交换机</text>
    <text class="s" x="80" y="86" text-anchor="middle">Network</text>
  </g>
  <path class="line" d="M545 300 H665" marker-end="url(#arrow)"/>
  <g transform="translate(675 240)">
    <rect class="box" x="0" y="0" width="160" height="120" rx="16"/>
    <text class="t" x="80" y="55" text-anchor="middle">存储控制器</text>
    <text class="s" x="80" y="86" text-anchor="middle">Target</text>
  </g>
  <path class="line" d="M840 300 H960" marker-end="url(#arrow)"/>
  <g transform="translate(970 240)">
    <rect class="box" x="0" y="0" width="160" height="120" rx="16"/>
    <text class="t" x="80" y="55" text-anchor="middle">磁盘池</text>
    <text class="s" x="80" y="86" text-anchor="middle">RAID / SSD</text>
  </g>
  <rect class="warn" x="315" y="440" width="250" height="78" rx="14"/>
  <text class="t" x="440" y="474" text-anchor="middle">网络抖动 / 丢包</text>
  <text class="s" x="440" y="500" text-anchor="middle">会放大为 I/O 超时</text>
  <path class="dash" d="M440 438 C430 398 440 366 460 334"/>
  <circle class="dot" cx="460" cy="334" r="7"/>
  <rect class="warn" x="650" y="440" width="250" height="78" rx="14"/>
  <text class="t" x="775" y="474" text-anchor="middle">存储延迟 / 重启</text>
  <text class="s" x="775" y="500" text-anchor="middle">客户端看到磁盘异常</text>
  <path class="dash" d="M775 438 C772 398 770 366 755 334"/>
  <circle class="dot" cx="755" cy="334" r="7"/>
  <text class="s" x="600" y="602" text-anchor="middle">它像本地盘，但风险会沿网络和存储链路传递到操作系统</text>
</svg>
