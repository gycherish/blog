<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
<defs>
<style>text{font-family:"Microsoft YaHei","PingFang SC","Noto Sans CJK SC",Arial,sans-serif;letter-spacing:0}</style>
<marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#2563eb"/></marker>
<marker id="arrow-purple" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#7c3aed"/></marker>
<marker id="arrow-green" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#059669"/></marker>
<marker id="arrow-orange" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#ea580c"/></marker>
<marker id="arrow-muted" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L0,6 L9,3 z" fill="#94a3b8"/></marker>
</defs>
<rect width="1600" height="900" fill="#f7f9fc"/>
<text x="800" y="108" font-size="54" font-weight="700" fill="#172033" text-anchor="middle">高性能通信发展大时间线</text>
<text x="800" y="155" font-size="28" font-weight="400" fill="#5b6475" text-anchor="middle">从专用 HPC fabric，到 RDMA over Ethernet，再到 AI scale-up / scale-out 网络</text>
<line x1="190" y1="425" x2="1410" y2="425" stroke="#94a3b8" stroke-width="6"/>
<circle cx="190.0" cy="425" r="16" fill="#2563eb" stroke="#fff" stroke-width="4"/>
<line x1="190.0" y1="409" x2="190.0" y2="330" stroke="#2563eb" stroke-width="3"/>
<rect x="70.0" y="170" width="240" height="160" rx="20" fill="#fff" stroke="#2563eb" stroke-width="3"/>
<text x="190.0" y="210" font-size="20" font-weight="400" fill="#2563eb" text-anchor="middle">1990s-2000s</text>
<text x="190.0" y="245" font-size="27" font-weight="700" fill="#172033" text-anchor="middle">专用 HPC 网络</text>
<text x="190.0" y="282" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">Myrinet / Quadrics</text>
<text x="190.0" y="312" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">低延迟，生态较窄</text>
<circle cx="434.0" cy="425" r="16" fill="#7c3aed" stroke="#fff" stroke-width="4"/>
<line x1="434.0" y1="441" x2="434.0" y2="520" stroke="#7c3aed" stroke-width="3"/>
<rect x="314.0" y="520" width="240" height="160" rx="20" fill="#fff" stroke="#7c3aed" stroke-width="3"/>
<text x="434.0" y="560" font-size="20" font-weight="400" fill="#7c3aed" text-anchor="middle">1999/2000</text>
<text x="434.0" y="595" font-size="27" font-weight="700" fill="#172033" text-anchor="middle">InfiniBand 标准化</text>
<text x="434.0" y="632" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">IBTA / IB v1.0</text>
<text x="434.0" y="662" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">原生 RDMA fabric</text>
<circle cx="678.0" cy="425" r="16" fill="#0891b2" stroke="#fff" stroke-width="4"/>
<line x1="678.0" y1="409" x2="678.0" y2="330" stroke="#0891b2" stroke-width="3"/>
<rect x="558.0" y="170" width="240" height="160" rx="20" fill="#fff" stroke="#0891b2" stroke-width="3"/>
<text x="678.0" y="210" font-size="20" font-weight="400" fill="#0891b2" text-anchor="middle">2007/2010/2014</text>
<text x="678.0" y="245" font-size="27" font-weight="700" fill="#172033" text-anchor="middle">以太网上的 RDMA</text>
<text x="678.0" y="282" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">iWARP / RoCE v1/v2</text>
<text x="678.0" y="312" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">从 TCP 到 UDP/IP</text>
<circle cx="922.0" cy="425" r="16" fill="#059669" stroke="#fff" stroke-width="4"/>
<line x1="922.0" y1="441" x2="922.0" y2="520" stroke="#059669" stroke-width="3"/>
<rect x="802.0" y="520" width="240" height="160" rx="20" fill="#fff" stroke="#059669" stroke-width="3"/>
<text x="922.0" y="560" font-size="20" font-weight="400" fill="#059669" text-anchor="middle">2015-2020</text>
<text x="922.0" y="595" font-size="27" font-weight="700" fill="#172033" text-anchor="middle">RoCE 大规模落地</text>
<text x="922.0" y="632" font-size="19" font-weight="400" fill="#5b6475" text-anchor="middle">DCQCN / TIMELY / HPCC</text>
<text x="922.0" y="662" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">拥塞控制成为主线</text>
<circle cx="1166.0" cy="425" r="16" fill="#ea580c" stroke="#fff" stroke-width="4"/>
<line x1="1166.0" y1="409" x2="1166.0" y2="330" stroke="#ea580c" stroke-width="3"/>
<rect x="1046.0" y="170" width="240" height="160" rx="20" fill="#fff" stroke="#ea580c" stroke-width="3"/>
<text x="1166.0" y="210" font-size="20" font-weight="400" fill="#ea580c" text-anchor="middle">2015-2025</text>
<text x="1166.0" y="245" font-size="27" font-weight="700" fill="#172033" text-anchor="middle">Omni-Path 插曲</text>
<text x="1166.0" y="282" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">Intel OPA → Cornelis</text>
<text x="1166.0" y="312" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">专用 fabric 的兴衰</text>
<circle cx="1410.0" cy="425" r="16" fill="#dc2626" stroke="#fff" stroke-width="4"/>
<line x1="1410.0" y1="441" x2="1410.0" y2="520" stroke="#dc2626" stroke-width="3"/>
<rect x="1290.0" y="520" width="240" height="160" rx="20" fill="#fff" stroke="#dc2626" stroke-width="3"/>
<text x="1410.0" y="560" font-size="20" font-weight="400" fill="#dc2626" text-anchor="middle">2023-现在</text>
<text x="1410.0" y="595" font-size="27" font-weight="700" fill="#172033" text-anchor="middle">AI 网络再架构</text>
<text x="1410.0" y="632" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">UEC / UALink / NVLink</text>
<text x="1410.0" y="662" font-size="20" font-weight="400" fill="#5b6475" text-anchor="middle">万卡训练驱动重构</text>
<rect x="260" y="760" width="1080" height="75" rx="20" fill="#eff6ff" stroke="#bfdbfe" stroke-width="2"/>
<text x="800" y="811" font-size="27" font-weight="700" fill="#2563eb" text-anchor="middle">长期主线：低延迟 + 高带宽 + 低 CPU 开销 + 可扩展 + 可运营</text>
</svg>
