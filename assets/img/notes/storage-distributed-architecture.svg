<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="660" viewBox="0 0 1200 660" role="img" aria-labelledby="title desc">
  <title id="title">分布式存储从专用阵列到普通服务器集群</title>
  <desc id="desc">展示从专用存储阵列到 GFS、Dynamo、Ceph、S3 这类分布式存储架构的演进。</desc>
  <defs>
    <style>
      .bg{fill:#f8fafc}.h{font:700 34px "Microsoft YaHei",Arial,sans-serif;fill:#172033}.box{fill:#fff;stroke:#d8e0ea;stroke-width:2}.old{fill:#fff3d8;stroke:#d2a13b;stroke-width:3}.new{fill:#e8f2ff;stroke:#5594d2;stroke-width:3}.svc{fill:#eaf7ef;stroke:#55a36b;stroke-width:2}.t{font:700 22px "Microsoft YaHei",Arial,sans-serif;fill:#25324a}.s{font:16px "Microsoft YaHei",Arial,sans-serif;fill:#617086}.mono{font:15px Consolas,"Microsoft YaHei",monospace;fill:#24324a}.line{stroke:#63758a;stroke-width:4;fill:none;stroke-linecap:round}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto">
      <path d="M0 0 10 5 0 10z" fill="#63758a"/>
    </marker>
  </defs>
  <rect class="bg" width="1200" height="660"/>
  <text class="h" x="600" y="58" text-anchor="middle">分布式存储：从阵列到普通服务器集群</text>
  <rect class="old" x="80" y="150" width="300" height="310" rx="18"/>
  <text class="t" x="230" y="196" text-anchor="middle">传统集中式阵列</text>
  <text class="s" x="230" y="232" text-anchor="middle">专用控制器 + 磁盘柜</text>
  <rect class="box" x="130" y="270" width="200" height="58" rx="10"/>
  <text class="mono" x="230" y="306" text-anchor="middle">RAID / LUN / FC</text>
  <rect class="box" x="130" y="350" width="200" height="58" rx="10"/>
  <text class="mono" x="230" y="386" text-anchor="middle">Scale-up</text>
  <path class="line" d="M400 305 H520" marker-end="url(#arrow)"/>
  <rect class="new" x="545" y="110" width="575" height="405" rx="18"/>
  <text class="t" x="832" y="154" text-anchor="middle">分布式存储集群</text>
  <text class="s" x="832" y="184" text-anchor="middle">普通服务器 + 软件层 + 自动容错</text>
  <g transform="translate(610 225)">
    <rect class="box" x="0" y="0" width="120" height="78" rx="12"/><text class="mono" x="60" y="46" text-anchor="middle">Node 1</text>
    <rect class="box" x="155" y="0" width="120" height="78" rx="12"/><text class="mono" x="215" y="46" text-anchor="middle">Node 2</text>
    <rect class="box" x="310" y="0" width="120" height="78" rx="12"/><text class="mono" x="370" y="46" text-anchor="middle">Node 3</text>
    <rect class="box" x="78" y="112" width="120" height="78" rx="12"/><text class="mono" x="138" y="158" text-anchor="middle">Node 4</text>
    <rect class="box" x="233" y="112" width="120" height="78" rx="12"/><text class="mono" x="293" y="158" text-anchor="middle">Node 5</text>
  </g>
  <rect class="svc" x="625" y="455" width="155" height="58" rx="12"/>
  <rect class="svc" x="800" y="455" width="155" height="58" rx="12"/>
  <rect class="svc" x="975" y="455" width="120" height="58" rx="12"/>
  <text class="s" x="702" y="491" text-anchor="middle">对象 / S3</text>
  <text class="s" x="877" y="491" text-anchor="middle">块 / RBD</text>
  <text class="s" x="1035" y="491" text-anchor="middle">文件 / FS</text>
  <text class="s" x="600" y="585" text-anchor="middle">核心思想：把硬件故障当常态，用副本、纠删码、校验和和自动恢复兜住可靠性</text>
</svg>
