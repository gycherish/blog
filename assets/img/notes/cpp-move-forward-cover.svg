<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <style>
      text {
        font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", Arial, sans-serif;
        letter-spacing: 0;
      }
      .title { font-size: 52px; font-weight: 700; fill: #172033; }
      .subtitle { font-size: 25px; fill: #64748b; }
      .label { font-size: 28px; font-weight: 700; fill: #172033; }
      .small { font-size: 20px; fill: #64748b; }
      .code { font-family: "Cascadia Code", Consolas, "Courier New", monospace; }
    </style>
    <filter id="shadow" x="-10%" y="-15%" width="120%" height="135%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow-blue" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#059669"/>
    </marker>
    <marker id="arrow-orange" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#ea580c"/>
    </marker>
    <marker id="arrow-purple" markerWidth="12" markerHeight="12" refX="10" refY="4" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,8 L11,4 z" fill="#7c3aed"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#f7f9fc"/>

  <text x="800" y="88" text-anchor="middle" class="title">移动语义与完美转发</text>
  <text x="800" y="132" text-anchor="middle" class="subtitle">Modern C++ Performance Basics</text>

  <rect x="90" y="210" width="420" height="520" rx="30" fill="#ffffff" stroke="#d8e0ea" stroke-width="2" filter="url(#shadow)"/>
  <text x="300" y="270" text-anchor="middle" class="label">Value Categories</text>

  <rect x="145" y="335" width="310" height="78" rx="20" fill="#eff6ff" stroke="#2563eb" stroke-width="3"/>
  <text x="300" y="384" text-anchor="middle" class="code" font-size="30" font-weight="700" fill="#2563eb">lvalue</text>

  <rect x="145" y="455" width="310" height="78" rx="20" fill="#fff7ed" stroke="#ea580c" stroke-width="3"/>
  <text x="300" y="504" text-anchor="middle" class="code" font-size="30" font-weight="700" fill="#ea580c">xvalue</text>

  <rect x="145" y="575" width="310" height="78" rx="20" fill="#ecfdf5" stroke="#059669" stroke-width="3"/>
  <text x="300" y="624" text-anchor="middle" class="code" font-size="30" font-weight="700" fill="#059669">prvalue</text>

  <rect x="605" y="200" width="390" height="540" rx="32" fill="#111827" stroke="#111827" stroke-width="1" filter="url(#shadow)"/>
  <text x="800" y="270" text-anchor="middle" font-size="30" font-weight="700" fill="#ffffff">Move Semantics</text>

  <circle cx="800" cy="383" r="88" fill="#1e293b" stroke="#38bdf8" stroke-width="4"/>
  <text x="800" y="374" text-anchor="middle" class="code" font-size="31" font-weight="700" fill="#e0f2fe">std::move</text>
  <text x="800" y="414" text-anchor="middle" font-size="21" fill="#cbd5e1">cast to xvalue</text>

  <rect x="675" y="535" width="250" height="82" rx="22" fill="#fffbeb" stroke="#f59e0b" stroke-width="3"/>
  <text x="800" y="586" text-anchor="middle" class="code" font-size="29" font-weight="700" fill="#d97706">T&amp;&amp;</text>

  <rect x="1090" y="210" width="420" height="520" rx="30" fill="#ffffff" stroke="#d8e0ea" stroke-width="2" filter="url(#shadow)"/>
  <text x="1300" y="270" text-anchor="middle" class="label">Perfect Forwarding</text>

  <rect x="1145" y="355" width="310" height="78" rx="20" fill="#f5f3ff" stroke="#7c3aed" stroke-width="3"/>
  <text x="1300" y="404" text-anchor="middle" class="code" font-size="29" font-weight="700" fill="#7c3aed">T&amp;&amp; args</text>

  <rect x="1145" y="535" width="310" height="78" rx="20" fill="#eef2ff" stroke="#4f46e5" stroke-width="3"/>
  <text x="1300" y="586" text-anchor="middle" class="code" font-size="28" font-weight="700" fill="#4f46e5">std::forward</text>

  <path d="M455 374 C535 374 560 382 605 382" fill="none" stroke="#2563eb" stroke-width="5" marker-end="url(#arrow-blue)"/>
  <path d="M455 494 C535 494 585 430 712 397" fill="none" stroke="#ea580c" stroke-width="5" marker-end="url(#arrow-orange)"/>
  <path d="M455 614 C535 614 570 575 675 575" fill="none" stroke="#059669" stroke-width="5" marker-end="url(#arrow-green)"/>

  <path d="M800 471 L800 535" fill="none" stroke="#f59e0b" stroke-width="5" marker-end="url(#arrow-orange)"/>
  <path d="M925 576 C1005 576 1058 576 1145 576" fill="none" stroke="#4f46e5" stroke-width="5" marker-end="url(#arrow-purple)"/>
  <path d="M995 383 C1055 383 1080 394 1145 394" fill="none" stroke="#7c3aed" stroke-width="5" marker-end="url(#arrow-purple)"/>

  <rect x="600" y="790" width="400" height="58" rx="20" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
  <text x="800" y="828" text-anchor="middle" class="small">copy less · move safely · forward exactly</text>

  <circle cx="570" cy="790" r="8" fill="#2563eb"/>
  <circle cx="1030" cy="790" r="8" fill="#059669"/>
  <line x1="578" y1="790" x2="992" y2="790" stroke="#cbd5e1" stroke-width="3"/>
</svg>
